{% extends 'base.html' %}
{% block title %}Crear cuenta — Django Notes{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h3 mb-4 text-center">
          <i class="bi bi-person-plus"></i> Crear cuenta
        </h1>

        {% if error %}
          <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form action="{% url 'signup' %}" method="POST" novalidate>
          {% csrf_token %}

          <div class="mb-3">
            <label for="id_username" class="form-label">Usuario</label>
            <input
              type="text"
              name="username"
              id="id_username"
              class="form-control"
              placeholder="Elige un nombre de usuario"
              required
              autofocus
            />
          </div>

          <div class="mb-3">
            <label for="id_password1" class="form-label">Contraseña</label>
            <input
              type="password"
              name="password1"
              id="id_password1"
              class="form-control"
              placeholder="Crea una contraseña"
              required
              minlength="8"
            />
          </div>

          <div class="mb-3">
            <label for="id_password2" class="form-label">Confirmar contraseña</label>
            <input
              type="password"
              name="password2"
              id="id_password2"
              class="form-control"
              placeholder="Repite tu contraseña"
              required
              minlength="8"
            />
            <div class="form-text">Debe coincidir con la contraseña anterior.</div>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-person-plus"></i> Registrarme
          </button>
        </form>

        <p class="text-center text-muted mt-3 mb-0">
          ¿Ya tienes cuenta?
          <a href="{% url 'signin' %}">Inicia sesión</a>
        </p>
      </div>
    </div>
  </div>
</div>

{% endblock %}
